name: Windows App Release
# Release contract: actions/attest-build-provenance@v3
# Release contract: tools/windows_runtime_attestation.no

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: windows-app-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-windows-app:
    name: Build Windows app artifacts
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Materialiser stage-0 seed
        run: |
          set -euo pipefail
          mkdir -p dist
          cp bootstrap/stage0/norscode-windows-x86_64.exe dist/norscode_native
          chmod +x dist/norscode_native

      - name: Installer Zig for Windows native build og backend smoke
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Bygg Windows native runtime
        run: |
          # Release contract: ./bin/nc feature-check app.no
          # Release contract: tools/hosting_runtime_gate_v3610.no
          # Release contract: zig build-obj archive/legacy_c_backend/nc_argon2_zig.zig
          # Release contract: build/v3009/native_candidate_gc.c
          set -euo pipefail
          export ZIG_LOCAL_CACHE_DIR="$RUNNER_TEMP/norscode-zig-local-cache"
          export ZIG_GLOBAL_CACHE_DIR="$RUNNER_TEMP/norscode-zig-global-cache"
          rm -rf "$ZIG_LOCAL_CACHE_DIR" "$ZIG_GLOBAL_CACHE_DIR"
          mkdir -p "$ZIG_LOCAL_CACHE_DIR" "$ZIG_GLOBAL_CACHE_DIR"
          mkdir -p build/windows
          zig build-obj --cache-dir "$ZIG_LOCAL_CACHE_DIR" --global-cache-dir "$ZIG_GLOBAL_CACHE_DIR" \
            archive/legacy_c_backend/nc_argon2_zig.zig \
            -target x86_64-windows-gnu -O ReleaseFast -fsingle-threaded \
            -femit-bin=build/windows/nc_argon2_zig_windows_x86_64.o
          zig cc -target x86_64-windows-gnu -O0 -DNC_ENABLE_ZIG_ARGON2 -c \
            archive/legacy_c_backend/nc_windows_runtime_bundle.c \
            -Iarchive/legacy_c_backend -o build/windows/nc_windows_runtime_bundle.o
          zig cc -target x86_64-windows-gnu -O0 -c \
            third_party/sqlite/sqlite3.c -Iarchive/legacy_c_backend \
            -o build/windows/sqlite3.o
          zig cc -target x86_64-windows-gnu -O0 \
            build/windows/nc_windows_runtime_bundle.o \
            build/windows/sqlite3.o \
            build/windows/nc_argon2_zig_windows_x86_64.o \
            -lc -lws2_32 -lbcrypt -ladvapi32 -luserenv -lshell32 -luser32 \
            -lntdll -lsecur32 -lcrypt32 -o build/windows/norscode.exe

      - name: Finn Windows-native exe
        run: |
          set -euo pipefail
          for candidate in \
            build/windows/norscode.exe \
            dist/windows/norscode.exe \
            release-artifacts/norscode.exe
          do
            if [ -f "$candidate" ]; then
              printf 'WINDOWS_EXE=%s\n' "$candidate" >> "$GITHUB_ENV"
              printf 'Brukar Windows exe: %s\n' "$candidate"
              exit 0
            fi
          done
          printf 'Feil: fann ikkje Windows-native norscode.exe i forventa release-stiar.\n' >&2
          printf 'Windows-release krev ein ferdig stage-0/native exe før ZIP og SHA256 kan publiserast.\n' >&2
          exit 1

      - name: Bygg innebygd NCB-image i Windows exe
        run: |
          set -euo pipefail
          export NORSCODE_EMBED_STREAM=1
          export NORSCODE_EMBED_BASE="$WINDOWS_EXE"
          export NORSCODE_EMBED_OUT="$RUNNER_TEMP/norscode-windows-embedded.exe"
          export NORSCODE_EMBED_SPECS="compiler=bootstrap/kompiler.ncb.json
          vm=bootstrap/precompiled/vm.ncb.json
          vm-executor=selfhost/vm_executor.ncb.json"
          NORSCODE_VM_CAPABILITIES="env.read,process.exec,disk.read,disk.write" \
          NORSCODE_VM_DISK_ROOT="$PWD,.,$RUNNER_TEMP" \
          ./bin/nc run tools/embed_release_ncb.no
          mv "$NORSCODE_EMBED_OUT" "$WINDOWS_EXE"

      - name: Bygg Windows backend-smoke
        run: |
          set -euo pipefail
          mkdir -p build/windows
          zig cc -target x86_64-windows-gnu -O0 \
            archive/legacy_c_backend/nc_windows_backend_smoke_bundle.c \
            -Iarchive/legacy_c_backend \
            -lws2_32 -lbcrypt -ladvapi32 -luserenv -lshell32 -luser32 -lntdll -lsecur32 -lcrypt32 \
            -o build/windows/nc_windows_backend_smoke_x86_64.exe
          zig cc -target x86_64-windows-gnu -O0 \
            archive/legacy_c_backend/nc_windows_appcontainer_smoke_bundle.c \
            -Iarchive/legacy_c_backend \
            -lws2_32 -lbcrypt -ladvapi32 -luserenv -lshell32 -luser32 -lntdll -lsecur32 -lcrypt32 \
            -o build/windows/nc_windows_appcontainer_smoke_x86_64.exe

      - name: Kjør og attester Windows runtime
        run: |
          set -euo pipefail
          # Same authoritative Norscode gate as the main CI workflow. It
          # verifies embedded NCB, runtime dispatch, network/IOCP/SChannel,
          # filesystem, Argon2 and ACME tests before writing the report.
          export NORSCODE_ROOT="$PWD"
          export NORSCODE_NATIVE_BIN="$PWD/build/windows/norscode.exe"
          export NORSCODE_WINDOWS_BACKEND_SMOKE="$PWD/build/windows/nc_windows_backend_smoke_x86_64.exe"
          export NORSCODE_WINDOWS_APPCONTAINER_SMOKE="$PWD/build/windows/nc_windows_appcontainer_smoke_x86_64.exe"
          NORSCODE_ENABLE_EXEC_PROSESS=1 \
          NORSCODE_VM_CAPABILITIES="env.read,process.exec,disk.read,disk.write" \
          NORSCODE_VM_DISK_ROOT="$PWD" ./bin/nc run tools/windows_runtime_attestation.no

      - name: Signer Windows runtime-attestasjon
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: reports/windows-runtime-attestation.json

      - name: Pakk Windows app artifacts
        run: |
          pwsh -NoProfile -NonInteractive -Command '
            $ErrorActionPreference = "Stop"
            $version = ((Get-Content norcode.toml | Select-String "version").Line -split [char]34)[1]
            if ([string]::IsNullOrWhiteSpace($version)) { $version = "1.0" }
            $stage = Join-Path $PWD "release-staging\Norscode"
            $release = Join-Path $PWD "release-artifacts"
            New-Item -ItemType Directory -Force $stage, $release | Out-Null
            Copy-Item .\build\windows\norscode.exe (Join-Path $stage "norscode.exe") -Force
            Set-Content (Join-Path $stage "nc.cmd") "@echo off`r`n%~dp0norscode.exe %*`r`n"
            Set-Content (Join-Path $stage "README.txt") "Norscode for Windows`r`n`r`nRun nc.cmd or nc.ps1.`r`n"
            $zip = Join-Path $release ("norscode-windows-{0}.zip" -f $version)
            if (Test-Path $zip) { Remove-Item $zip -Force }
            Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zip -Force
            (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() | Set-Content ($zip + ".sha256")
          '

      - name: Last opp Windows app artifacts
        uses: actions/upload-artifact@v6
        with:
          name: norscode-windows-app-artifacts
          path: |
            release-artifacts/norscode-windows-*.zip
            release-artifacts/norscode-windows-*.zip.sha256
            reports/windows-runtime-attestation.json
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub Release (Windows app)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-windows-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned Windows app artifacts
        uses: actions/download-artifact@v7
        with:
          name: norscode-windows-app-artifacts
          path: release-assets/

      - name: Publiser Windows app artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          append_body: true
          body: |

            ## Windows app

            Denne releasen inneheld no Windows app-artefakt:

            - `norscode-windows-<versjon>.zip`

            Installasjon og oppgradering er dokumentert i `docs/WINDOWS_APP_RELEASE.md` og `docs/WINDOWS_APP_INSTALL.md`.
