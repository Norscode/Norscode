name: Windows App Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: windows-app-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows-app:
    name: Build Windows app artifacts
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: C/Python-gate
        run: bash tools/no_c_python_active_surface.sh

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Finn Windows-native exe
        run: |
          set -euo pipefail
          for candidate in \
            dist/windows/norscode.exe \
            build/windows/norscode.exe \
            release-artifacts/norscode.exe
          do
            if [ -f "$candidate" ]; then
              printf 'WINDOWS_EXE=%s\n' "$candidate" >> "$GITHUB_ENV"
              printf 'Brukar Windows exe: %s\n' "$candidate"
              exit 0
            fi
          done
          printf 'Feil: fann ikkje Windows-native norscode.exe i forventa stiar.\n' >&2
          printf 'Denne workflowen er klar for ZIP/release, men repeterbar .exe-produksjon er framleis ikkje kopla inn.\n' >&2
          exit 1

      - name: Pakk Windows app artifacts
        run: bash tools/package-windows-app.sh "$WINDOWS_EXE"

      - name: Last opp Windows app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: norscode-windows-app-artifacts
          path: |
            release-artifacts/norscode-windows-*.zip
            release-artifacts/norscode-windows-*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub Release (Windows app)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-windows-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned Windows app artifacts
        uses: actions/download-artifact@v4
        with:
          name: norscode-windows-app-artifacts
          path: release-assets/

      - name: Publiser Windows app artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          append_body: true
          body: |

            ## Windows app

            Denne releasen inneheld no Windows app-artefakt:

            - `norscode-windows-<versjon>.zip`

            Installasjon og oppgradering er dokumentert i `docs/WINDOWS_APP_RELEASE.md` og `docs/WINDOWS_APP_INSTALL.md`.
