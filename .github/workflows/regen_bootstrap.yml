# L6: deterministisk regen frå .no (utan Python, utan committed bootstrap/c).
name: Regen bootstrap

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'selfhost/**'
      - 'bootstrap/**'
      - 'tools/regen_native.sh'
      - 'tools/regen_verify.sh'

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: regen-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regen-verify:
    name: Regen-verify (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang libsqlite3-dev

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Bygg stage-0 (maintainer regen-lane)
        run: REGEN=1 bash tools/build_norscode_native.sh

      - name: Regenerer og samanlikn hash
        run: bash tools/regen_verify.sh

      - name: nc_main host-smoke
        run: bash tools/verify_nc_main_host.sh
