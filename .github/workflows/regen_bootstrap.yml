# Maintainer-only workflow for seed-maintenance og deterministisk regen.
# Dette er ikkje normal build/test/CI-flyt.
# Workflowen verifiserer maintainer-lanen der lokal regen-output og REGEN=1
# framleis blir brukt for seed-vedlikehald og samanlikning.
name: Regen bootstrap

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'selfhost/**'
      - 'bootstrap/**'
      - 'tools/maint/**'
      - 'archive/legacy_c_backend/**'

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: regen-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regen-verify:
    name: Regen-verify (Linux maintainer-lane)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang libsqlite3-dev

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Bygg stage-0 (maintainer regen-lane)
        run: NORSCODE_BOOTSTRAP_C=1 REGEN=1 bash tools/build_norscode_native.sh

      - name: Regenerer og samanlikn maintainer-output
        run: bash tools/regen_verify.sh

      - name: nc_main host-smoke (maintainer / opt-in)
        run: bash tools/verify_nc_main_host.sh
