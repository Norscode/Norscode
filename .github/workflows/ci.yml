name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─── macOS (arm64) – helt Python-fri ────────────────────────────────────────
  # dist/norcode-bootstrap-compile er en pre-bygd arm64 Norscode-kompilator.
  # Ingen Python, ingen C-kompilator trengs.
  native-macos:
    name: Native macOS (arm64, Python-fri)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bygg bootstrap-binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Verifiser bootstrap-binary
        run: |
          chmod +x bin/nc
          ./bin/nc selfcheck

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no

  # ─── Linux (x86_64) – Python + selfhost gate ───────────────────────────────
  native-linux:
    name: Linux x86_64 (selfhost + Python-VM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bygg bootstrap-binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Selfhost bootstrap gate (.no-logikk via selfhost-kjede)
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no

      - name: Sjekk bin/nc versjon og hjelp
        run: |
          chmod +x bin/nc
          ./bin/nc --version || true
          ./bin/nc selfcheck

  # ─── Windows – røyktest via Python-pakke ───────────────────────────────────
  # Windows-støtte er sekundær. Python-pakken testes her inntil native
  # Windows-binary er tilgjengelig.
  smoke-windows:
    name: Windows røyktest (Python-pakke)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer pakke
        run: python -m pip install .

      - name: Sjekk CLI-inngangspunkt
        run: norcode --help

      - name: Røyktest (utan nettverksavhengigheiter)
        run: norcode check tests/test_if.no
