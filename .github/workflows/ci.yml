name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

  drift-guard:
    name: Driftsvakt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Driftsvakt
        run: bash tools/selfhost_drift_guard.sh

  # ─── macOS (arm64) ───────────────────────────────────────────────────────────
  native-macos:
    name: Native macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifiser norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (48/48)
        run: ./bin/nc test

      - name: Selfcheck
        run: ./bin/nc selfcheck

  # ─── Linux (x86_64) ──────────────────────────────────────────────────────────
  native-linux:
    name: Native Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifiser norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (48/48)
        run: ./bin/nc test

      - name: Selfcheck
        run: ./bin/nc selfcheck
