name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─── macOS (arm64) – helt Python-fri ────────────────────────────────────────
  # dist/norcode-bootstrap-compile er en pre-bygd arm64 Norscode-kompilator.
  # Ingen Python, ingen C-kompilator trengs.
  native-macos:
    name: Native macOS (arm64, Python-fri)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifiser native kompilator
        run: |
          chmod +x dist/norcode-bootstrap-compile
          NORCODE_BOOTSTRAP_VM=1 NORCODE_BOOTSTRAP_CLI=1 \
            NORCODE_ARGC=1 NORCODE_ARG0=selfcheck \
            ./dist/norcode-bootstrap-compile

      - name: Kjør native tester
        run: |
          NORCODE_BOOTSTRAP_VM=1 NORCODE_BOOTSTRAP_CLI=1 \
            NORCODE_ARGC=1 NORCODE_ARG0=test \
            ./dist/norcode-bootstrap-compile

      - name: Sjekk bin/nc dispatcher
        run: |
          chmod +x bin/nc bin/bootstrap
          ./bin/nc selfcheck
          ./bin/nc test

  # ─── Linux (x86_64) – Python + Docker freestanding binary ──────────────────
  # ubuntu-latest ER x86_64. Python brukes til selfhost-bootstrap-gate +
  # generering av NCB-data. Deretter bygges freestanding C VM-binary via Docker.
  native-linux:
    name: Linux x86_64 (selfhost + Docker freestanding)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Selfhost bootstrap gate (296/296 .no-filer)
        run: python3 main.py selfhost-bootstrap-gate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bygg freestanding Linux x86_64 binary via Docker
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile.linux-build \
            --target export \
            --output type=local,dest=dist-linux \
            .
          cp dist-linux/norscode-linux-x86_64 build/norscode-bootstrap-compile-linux
          chmod +x build/norscode-bootstrap-compile-linux
          echo "Docker build: OK"

      - name: Selfcheck freestanding binary
        run: |
          NORCODE_BOOTSTRAP_VM=1 NORCODE_BOOTSTRAP_CLI=1 \
            NORCODE_ARGC=1 NORCODE_ARG0=selfcheck \
            ./build/norscode-bootstrap-compile-linux
          echo "Linux x86_64 selfcheck: OK"

      - name: Sjekk bin/nc routing
        run: |
          chmod +x bin/nc bin/bootstrap
          ./bin/nc --version
          ./bin/nc commands
          ./bin/nc ci --bootstrap-lane --bootstrap-output-dir build/selfhost-bootstrap-gate

  # ─── Windows – kun grunnleggende røyktest via Python ───────────────────────
  # Windows-støtte er sekundær. Python-pakken testes her inntil native
  # Windows-binary er tilgjengelig.
  smoke-windows:
    name: Windows røyktest (Python-pakke)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer pakke
        run: python -m pip install .

      - name: Sjekk CLI-inngangspunkt
        run: norcode --help

      - name: Røyktest
        run: norcode check tests/test_web_dependency.no
