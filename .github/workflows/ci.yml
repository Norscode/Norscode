name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

      - name: Ingen legacy C-VM under tools/
        run: bash tools/no_legacy_cvm.sh

  drift-guard:
    name: Driftsvakt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Driftsvakt
        run: bash tools/selfhost_drift_guard.sh

  seed-only:
    name: Seed-only (utan clang)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifiser seed-only lane
        run: bash tools/verify_seed_only.sh

  native-macos:
    name: Native macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (native)
        run: ./bin/nc test

      - name: Bootstrap-self (steg C)
        run: ./bin/nc bootstrap-self

  native-linux:
    name: Native Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Bootstrap-self (steg C)
        run: ./bin/nc bootstrap-self

      - name: Testsuite (native)
        run: ./bin/nc test

      - name: Native ELF smoke (Omgang 6)
        run: |
          printf 'funksjon start() {\n  skriv("ELF-smoke OK\\n")\n  la x: heltall = 6 * 7\n  skriv(tekst_fra_heltall(x) + "\\n")\n}\n' > /tmp/elf_smoke.no
          ./bin/nc bygg-native /tmp/elf_smoke.no /tmp/elf_smoke
          chmod +x /tmp/elf_smoke
          OUT="$(/tmp/elf_smoke)"
          echo "ELF output: $OUT"
          echo "$OUT" | grep -q "ELF-smoke OK" || { echo "FEIL: forventa 'ELF-smoke OK'"; exit 1; }
          echo "$OUT" | grep -q "42" || { echo "FEIL: forventa '42'"; exit 1; }
          echo "✓ Native ELF køyrer korrekt på Linux x86-64"

  format-lint-check:
    name: Format og Lint (Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Lint selfhost-filer
        run: |
          for f in selfhost/lexer/lexer_m1.no selfhost/parser.no selfhost/kompiler.no; do
            if ! bin/nc lint "$f" --check 2>/dev/null; then
              echo "LINT-ÅTVARING: $f"
            fi
          done
