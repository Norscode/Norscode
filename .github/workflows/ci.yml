name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}
  NC_CI: "1"
  TEST_TIMEOUT: "120"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: bash tools/selfhost_phase0_verify.sh
      - run: bash tools/no_legacy_cvm.sh

  drift-guard:
    name: Driftsvakt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: bash tools/selfhost_drift_guard.sh

  seed-only:
    name: Seed-only (utan clang)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - run: bash tools/verify_seed_only.sh

  # ─── macOS: bygg → artefakt → verify (test får eiga 120 min) ─────────────────
  native-macos-build:
    name: Build macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - run: bash tools/build_norscode_native.sh
      - uses: actions/upload-artifact@v4
        with:
          name: norscode-native-macos
          path: |
            dist/norscode_native
            bin/nc
          retention-days: 1

  native-macos:
    name: Native macOS (arm64)
    needs: native-macos-build
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-macos
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - run: ./bin/nc selfhost-bootstrap-gate
      - run: ./bin/nc bootstrap-self
      - name: Test (rask CI — utan chunk/selfhost-monolitt)
        run: ./bin/nc test
      - run: bash tools/verify_omgang6.sh
      - run: bash tools/verify_omgang6b.sh

  native-macos-slow:
    name: Slow tests macOS (chunk/selfhost)
    needs: native-macos-build
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-macos
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - name: Parser-stress og selfhost-monolitt
        run: NC_SLOW_TESTS=1 TEST_TIMEOUT=600 sh tools/nc_test.sh

  # ─── Linux: bygg → artefakt → verify ─────────────────────────────────────────
  native-linux-build:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Stage-0 seed
        run: |
          if [ "$(uname -s)" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y clang
          fi
          bash tools/ensure_stage0_seed.sh
      - run: bash tools/build_norscode_native.sh
      - name: Stage0-seed artefakt (migrering)
        if: success()
        run: test -f bootstrap/stage0/norscode-linux-x86_64
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: stage0-linux-x86_64
          path: bootstrap/stage0/norscode-linux-x86_64
          retention-days: 14
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: norscode-native-linux
          path: |
            dist/norscode_native
            bin/nc
          retention-days: 1

  native-linux:
    name: Native Linux (x86_64)
    needs: native-linux-build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-linux
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - run: ./bin/nc selfhost-bootstrap-gate
      - run: ./bin/nc bootstrap-self
      - name: Test (rask CI — utan chunk/selfhost-monolitt)
        run: ./bin/nc test
      - run: bash tools/verify_omgang6.sh
      - run: bash tools/verify_omgang6b.sh

  native-linux-slow:
    name: Slow tests Linux (chunk/selfhost)
    needs: native-linux-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-linux
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - name: Parser-stress og selfhost-monolitt
        run: NC_SLOW_TESTS=1 TEST_TIMEOUT=600 sh tools/nc_test.sh

  format-lint-check:
    name: Format og Lint (Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Stage-0 seed
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          bash tools/ensure_stage0_seed.sh
      - run: bash tools/build_norscode_native.sh
      - run: |
          for f in selfhost/lexer/lexer_m1.no selfhost/parser.no selfhost/kompiler.no; do
            if ! bin/nc lint "$f" --check 2>/dev/null; then
              echo "LINT-ÅTVARING: $f"
            fi
          done
