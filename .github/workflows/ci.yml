name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

  # ─── macOS (arm64) – Python-fri ─────────────────────────────────────────────
  native-macos:
    name: Native macOS (arm64, Python-fri)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg nc-vm og køyr bootstrap gate
        run: bash tools/build-bootstrap-binary.sh

      - name: Selfcheck
        run: ./bin/nc selfcheck

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no

  # ─── Linux (x86_64) – Python-fri ────────────────────────────────────────────
  native-linux:
    name: Native Linux (x86_64, Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg nc-vm og køyr bootstrap gate
        run: bash tools/build-bootstrap-binary.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no

      - name: Selfcheck
        run: ./bin/nc selfcheck
