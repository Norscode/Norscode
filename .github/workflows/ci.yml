name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}
  NC_CI: "1"
  TEST_TIMEOUT: "120"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/no_c_python_active_surface.sh
      - run: bash tools/selfhost_phase0_verify.sh
      - run: bash tools/no_legacy_cvm.sh

  drift-guard:
    name: Driftsvakt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/selfhost_drift_guard.sh

  seed-only:
    name: Seed-only
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/verify_seed_only.sh

  # ─── macOS: bygg → artefakt → verify (test får eiga 120 min) ─────────────────
  native-macos-build:
    name: Build macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - run: NORSCODE_BOOTSTRAP_C=1 REGEN=1 bash tools/build_norscode_native.sh
      - uses: actions/upload-artifact@v4
        with:
          name: norscode-native-macos
          path: |
            dist/norscode_native
            bin/nc
          retention-days: 1

  native-macos:
    name: Native macOS (arm64)
    needs: native-macos-build
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-macos
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - run: ./bin/nc selfhost-bootstrap-gate
      - name: "Steg C: Bootstrap-self (pure VM)"
        run: ./bin/nc bootstrap-self
      - name: "Test (rask CI): shard 1/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=0 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 2/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=1 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 3/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=2 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 4/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=3 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Omgang 6 smoke: skriv"
        run: bash tools/verify_omgang6.sh skriv
        continue-on-error: true
      - name: "Omgang 6 smoke: int-to-str"
        run: bash tools/verify_omgang6.sh int
        continue-on-error: true
      - name: "Omgang 6b: Stage-0 ELF (optional)"
        continue-on-error: true
        run: bash tools/verify_omgang6b.sh

  native-macos-slow:
    name: Slow tests macOS (chunk/selfhost)
    needs: native-macos-build
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-macos
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - name: Parser-stress og selfhost-monolitt
        run: NC_SLOW_TESTS=1 TEST_TIMEOUT=600 sh tools/nc_test.sh
        continue-on-error: true

  # ─── Linux: bygg → artefakt → verify ─────────────────────────────────────────
  native-linux-build:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang libsqlite3-dev
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - run: NORSCODE_BOOTSTRAP_C=1 REGEN=1 bash tools/build_norscode_native.sh
      - uses: actions/upload-artifact@v4
        with:
          name: norscode-native-linux
          path: |
            dist/norscode_native
            bin/nc
          retention-days: 1

  native-linux:
    name: Native Linux (x86_64)
    needs: native-linux-build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-linux
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - run: ./bin/nc selfhost-bootstrap-gate
      - name: "Steg C: Bootstrap-self (pure VM)"
        run: ./bin/nc bootstrap-self
      - name: "Test (rask CI): shard 1/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=0 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 2/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=1 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 3/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=2 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - name: "Test (rask CI): shard 4/4"
        timeout-minutes: 6
        run: NC_TEST_SHARD=3 NC_TEST_SHARDS=4 TEST_TIMEOUT=10 ./bin/nc test
      - run: bash tools/verify_omgang6.sh
        continue-on-error: true
      - name: "Omgang 6b: Stage-0 ELF (optional)"
        continue-on-error: true
        run: bash tools/verify_omgang6b.sh

  native-linux-slow:
    name: Slow tests Linux (chunk/selfhost)
    needs: native-linux-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-linux
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - name: Parser-stress og selfhost-monolitt
        run: NC_SLOW_TESTS=1 TEST_TIMEOUT=600 sh tools/nc_test.sh
        continue-on-error: true

  elf-selfcompile:
    name: ELF self-compile paritet (Linux x86_64)
    needs: native-linux-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: norscode-native-linux
          path: .
      - run: chmod +x dist/norscode_native bin/nc
      - name: "Gen1 ELF -> Gen2 ELF byte-paritet (transitional source-ncb)"
        continue-on-error: true
        run: NC_OM6B_RUN_STAGE0=1 bash tools/selfcompile_stage0_elf.sh
      - name: Last opp Gen1 ELF som stage-0 kandidat
        if: hashFiles('build/6b/selfcompile/stage0_elf_passed.marker') != ''
        uses: actions/upload-artifact@v4
        with:
          name: norscode-linux-x86_64-elf-candidate
          path: build/6b/selfcompile/gen1_compiler.elf
          retention-days: 7
      - name: Last opp transitional stage-0 status
        if: hashFiles('build/6b/selfcompile/stage0_elf_transitional.marker') != ''
        uses: actions/upload-artifact@v4
        with:
          name: norscode-linux-x86_64-elf-transitional-status
          path: |
            build/6b/selfcompile/stage0_elf_transitional.marker
            build/6b/selfcompile/gen1_compiler.elf
            build/6b/selfcompile/gen2.ncb.json
            build/6b/selfcompile/gen2_compiler.elf
          retention-days: 7

  format-lint-check:
    name: Format og Lint (Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - run: bash tools/build_norscode_native.sh
      - run: |
          for f in selfhost/lexer/lexer_m1.no selfhost/parser.no selfhost/kompiler.no; do
            if ! bin/nc lint "$f" --check 2>/dev/null; then
              echo "LINT-ÅTVARING: $f"
            fi
          done
