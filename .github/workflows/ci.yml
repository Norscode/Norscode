name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

  # ─── macOS (arm64) – norscode_native frå pre-bygde C-filer ──────────────────
  native-macos:
    name: Native macOS (arm64, ingen nc-vm)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native (berre clang)
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (48/48)
        run: ./bin/nc test

      - name: Selfcheck
        run: ./bin/nc selfcheck

  # ─── Linux (x86_64) – norscode_native frå pre-bygde C-filer ─────────────────
  native-linux:
    name: Native Linux (x86_64, ingen nc-vm)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native (berre clang)
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (48/48)
        run: ./bin/nc test

      - name: Selfcheck
        run: ./bin/nc selfcheck

  # ─── Drift-sjekk: er bootstrap/c/ oppdatert med selfhost-kjelda? ─────────────
  drift-check:
    name: Bootstrap drift-sjekk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Regenerer bootstrap/c/ frå selfhost-kjelde
        run: |
          env NORSCODE_CMD=run NORSCODE_FILE=selfhost/ncb_to_c.no \
              NC_NCB_INPUT=bootstrap/kompiler.ncb.json \
              NC_C_OUTPUT=/tmp/norscode_generated_fresh.c \
              ./dist/norscode_native
          env NORSCODE_CMD=run NORSCODE_FILE=selfhost/gen_dispatch.no \
              NC_NCB_INPUT=bootstrap/kompiler.ncb.json \
              NC_DISPATCH_OUTPUT=/tmp/nc_dispatch_fresh.c \
              ./dist/norscode_native

      - name: Sjekk at C-filer er oppdaterte (ingen drift)
        run: |
          if ! diff -q bootstrap/c/norscode_generated.c /tmp/norscode_generated_fresh.c; then
            echo "DRIFT FUNNEN: bootstrap/c/norscode_generated.c er utdatert!"
            echo "Køyr: sh tools/nc_regen_bootstrap.sh --full"
            diff bootstrap/c/norscode_generated.c /tmp/norscode_generated_fresh.c | head -20
            exit 1
          fi
          if ! diff -q bootstrap/c/nc_dispatch.c /tmp/nc_dispatch_fresh.c; then
            echo "DRIFT FUNNEN: bootstrap/c/nc_dispatch.c er utdatert!"
            echo "Køyr: sh tools/nc_regen_bootstrap.sh --full"
            exit 1
          fi
          echo "✓ bootstrap/c/ er oppdatert (ingen drift)"

      - name: Bygg norscode_native frå regenererte C-filer
        run: |
          cp /tmp/norscode_generated_fresh.c bootstrap/c/norscode_generated.c
          cp /tmp/nc_dispatch_fresh.c bootstrap/c/nc_dispatch.c
          bash tools/build_norscode_native.sh
          ./bin/nc test
          echo "✓ Ny norscode_native passerer 48/48 testar"
