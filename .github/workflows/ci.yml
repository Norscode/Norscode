name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # PR: avbryt eldre køyring. main: la køyringa fullføre (unngår exit 143 / SIGTERM).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

      - name: Ingen legacy C-VM under tools/
        run: bash tools/no_legacy_cvm.sh

  drift-guard:
    name: Driftsvakt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Driftsvakt
        run: bash tools/selfhost_drift_guard.sh

  seed-only:
    name: Seed-only (utan clang)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verifiser seed-only lane
        run: bash tools/verify_seed_only.sh

  native-macos:
    name: Native macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Testsuite (native)
        run: ./bin/nc test

      - name: Bootstrap-self (steg C)
        run: ./bin/nc bootstrap-self

      - name: Omgang 6 (bygg-native, determinisme)
        run: bash tools/verify_omgang6.sh

  native-linux:
    name: Native Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Bootstrap-self (steg C)
        run: ./bin/nc bootstrap-self

      - name: Testsuite (native)
        run: ./bin/nc test

      - name: Omgang 6 (bygg-native + Linux ELF)
        run: bash tools/verify_omgang6.sh

      - name: Omgang 6 ELF sjølvkompilering
        run: bash tools/selfcompile_native_elf.sh

  format-lint-check:
    name: Format og Lint (Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Lint selfhost-filer
        run: |
          for f in selfhost/lexer/lexer_m1.no selfhost/parser.no selfhost/kompiler.no; do
            if ! bin/nc lint "$f" --check 2>/dev/null; then
              echo "LINT-ÅTVARING: $f"
            fi
          done
