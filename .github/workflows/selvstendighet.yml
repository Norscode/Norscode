name: Selvstendighet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: selvstendighet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verifiser selvstendighet (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - run: ./bin/nc feature-check app.no
      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed
      - run: ./bin/nc verify-selvstendighet
        env:
          VERIFY_SKIP_TEST: ${{ github.event_name == 'push' && '1' || '0' }}
  elf-selfcompile:
    name: ELF self-compile paritet (Linux x86_64)
    needs: verify-linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed
      - name: "Hard gate: Gen1 ELF -> Gen2 ELF byte-paritet"
        run: NC_OM6B_RUN_STAGE0=1 ./bin/nc selfcompile-stage0-elf
