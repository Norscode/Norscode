name: Selvstendighet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: norscode-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verifiser selvstendighet (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Full selvstendighetsgate
        run: bash tools/verify_selvstendighet.sh
