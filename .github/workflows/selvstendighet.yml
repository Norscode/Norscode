name: Selvstendighet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: selvstendighet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verifiser selvstendighet (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - run: bash tools/no_c_python_active_surface.sh
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - run: bash tools/verify_selvstendighet.sh
        env:
          VERIFY_SKIP_TEST: ${{ github.event_name == 'push' && '1' || '0' }}
  elf-selfcompile:
    name: ELF self-compile paritet (Linux x86_64)
    needs: verify-linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh
      - name: "Hard gate: Gen1 ELF -> Gen2 ELF byte-paritet"
        run: NC_OM6B_RUN_STAGE0=1 bash tools/selfcompile_stage0_elf.sh
