name: Selvstendighet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: selvstendighet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verifiser selvstendighet (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y clang
      - run: bash tools/verify_selvstendighet.sh
        env:
          VERIFY_SKIP_TEST: ${{ github.event_name == 'push' && '1' || '0' }}
