name: Selvstendighet

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verifiser selvstendighet (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Full selvstendighetsgate
        run: bash tools/verify_selvstendighet.sh

  bootstrap-self-macos:
    name: Bootstrap-self (macOS)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Bootstrap-self
        run: ./bin/nc bootstrap-self
