name: Bootstrap Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  bootstrap-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: |
          chmod +x tools/cleanup_repo.sh || true
          chmod +x tools/python_dependency_audit.sh || true
          chmod +x tools/compare_compilers.sh || true
          chmod +x tests/bootstrap/bootstrap_verify.sh || true

      - name: Cleanup repository
        run: bash tools/cleanup_repo.sh

      - name: Run Python dependency audit
        run: bash tools/python_dependency_audit.sh

      - name: Bootstrap verification
        run: bash tests/bootstrap/bootstrap_verify.sh

      - name: Compiler equivalence verification
        run: |
          if [ -f build/compiler_stage1 ] && [ -f build/compiler_stage2 ]; then
            bash tools/compare_compilers.sh build/compiler_stage1 build/compiler_stage2
          else
            echo "Compiler outputs not found yet"
            exit 1
          fi
