name: Bootstrap Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

  # ─── norscode_native frå pre-bygde C-filer (macOS arm64) ─────────────────────
  bootstrap-native-macos:
    name: Bootstrap native (macOS arm64, ingen nc-vm)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfcheck
        run: ./bin/nc selfcheck

      - name: Identitetssjekk
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Rydd og verifiser repo
        run: |
          chmod +x tools/cleanup_repo.sh || true
          bash tools/cleanup_repo.sh

  # ─── Python-fri testsuite via norscode_native ─────────────────────────────────
  nc-native-test-suite:
    name: Python-fri testsuite (norscode_native)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Køyr Python-fri testsuite
        run: ./bin/nc test

  # ─── Linux: selfhost bootstrap gate ─────────────────────────────────────────
  bootstrap-selfhost-linux:
    name: Selfhost bootstrap gate (Python-fri, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfhost bootstrap gate
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Køyr Python-fri testsuite
        run: ./bin/nc test

  # ─── Format & Lint: Python-fri kodesjekk ──────────────────────────────────────
  format-lint-check:
    name: Format og Lint (Python-fri)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Lint selfhost-filer
        run: |
          _failed=0
          for f in selfhost/lexer/lexer_m1.no selfhost/parser.no selfhost/kompiler.no; do
            if ! bin/nc lint "$f" --check 2>/dev/null; then
              echo "LINT-FEIL: $f"
              _failed=1
            fi
          done
          exit 0  # Lint-åtvaringar stoppar ikkje CI
