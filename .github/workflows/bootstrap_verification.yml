name: Bootstrap Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  phase0-verify:
    name: Fase 0-verifikasjon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fase 0-verifikasjon
        run: bash tools/selfhost_phase0_verify.sh

  # ─── macOS (arm64): verifiser native binary direkte ─────────────────────────
  bootstrap-native-macos:
    name: Bootstrap native (macOS arm64, Python-fri)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg bootstrap-binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Verifiser native bootstrap-kompilator
        run: |
          chmod +x dist/norcode-bootstrap-compile bin/nc
          NORCODE_BOOTSTRAP_VM=1 NORCODE_BOOTSTRAP_CLI=1 \
            NORCODE_ARGC=1 NORCODE_ARG0=selfcheck \
            ./dist/norcode-bootstrap-compile

      - name: Deterministisk identitetssjekk
        run: |
          NORCODE_BOOTSTRAP_VM=1 NORCODE_BOOTSTRAP_CLI=1 \
            NORCODE_ARGC=1 NORCODE_ARG0=identity \
            ./dist/norcode-bootstrap-compile

      - name: Rydd og verifiser repo
        run: |
          chmod +x tools/cleanup_repo.sh || true
          bash tools/cleanup_repo.sh

  # ─── Python-fri testsuíte: nc-vm --nc-run alle test_*.no ────────────────────
  nc-vm-test-suite:
    name: Python-fri testsuíte (nc-vm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg nc-vm (berre clang, ingen Python)
        run: bash tools/bootstrap.sh

      - name: Køyr Python-fri testsuite
        run: sh tools/nc_test.sh

  # ─── Linux: Python-fri bootstrap gate ───────────────────────────────────────
  bootstrap-selfhost-linux:
    name: Selfhost bootstrap gate (Python-fri, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg nc-vm (berre clang)
        run: bash tools/bootstrap.sh

      - name: Selfhost bootstrap gate (Python-fri)
        run: ./bin/nc selfhost-bootstrap-gate

      - name: Køyr Python-fri testsuite
        run: sh tools/nc_test.sh
