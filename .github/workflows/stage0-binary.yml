# Hent eller verifiser stage-0 — bruk workflow_dispatch for manuell sjekk.
name: Stage-0 binary

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

permissions:
  contents: read

jobs:
  verify-download:
    name: Verifiser release-nedlasting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Hent norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Røyktest NORSCODE_CMD
        run: |
          printf 'funksjon start() { returner 7 }\n' > /tmp/_nc_smoke.no
          out="$(NORSCODE_CMD=run NORSCODE_FILE=/tmp/_nc_smoke.no dist/norscode_native 2>&1)" || {
            printf 'NORSCODE smoke feila:\n%s\n' "$out"
            exit 1
          }
          printf 'Smoke OK: %s\n' "$out"
