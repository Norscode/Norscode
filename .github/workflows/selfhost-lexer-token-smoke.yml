name: Selfhost Lexer Token Smoke

# Køyrer selfhost bootstrap gate når selfhost-lekseren eller tilhøyrande
# filer endrar seg. Brukar bin/nc — ingen Python eller C-kompilator trengs.

on:
  push:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  pull_request:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: lexer-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  token-smoke:
    name: Selfhost lexer parity-røyktest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Policy marker for bootstrap lane
        run: echo "ci --bootstrap-lane"

      - name: Selfhost bootstrap gate
        run: |
          chmod +x bin/nc
          ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no
