name: Selfhost Lexer Token Smoke

# Kjøres kun når selfhost-lekseren eller de tilhørende testene endres.
# Python brukes fordi selfhost-lexer-testen er en parity-test
# mellom Python-bootstrap og selfhost-implementasjonen.

on:
  push:
    paths:
      - 'selfhost/lexer/**'
      - 'tests/selfhost_lexer_token_smoke.no'
      - 'tests/test_selfhost_lexer_token_smoke.py'
      - 'tests/test_modular_cli_selfhost_commands.py'
      - 'selfhost/frontend/selfhost_lexer.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  pull_request:
    paths:
      - 'selfhost/lexer/**'
      - 'tests/selfhost_lexer_token_smoke.no'
      - 'tests/test_selfhost_lexer_token_smoke.py'
      - 'tests/test_modular_cli_selfhost_commands.py'
      - 'selfhost/frontend/selfhost_lexer.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  token-smoke:
    name: Selfhost lexer parity-røyktest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installer utviklingspakke
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Selfhost bootstrap lane (parity-grunnlag)
        run: python3 main.py ci --bootstrap-lane --bootstrap-output-dir build/selfhost-bootstrap-gate

      - name: Selfhost parity-sjekk
        run: python3 main.py selfhost-parity-progress

      - name: Token smoke CLI-gate
        run: norcode-modular selfhost-lexer-token-smoke --json

      - name: Token smoke pytest-gate
        run: python -m pytest tests/test_selfhost_lexer_token_smoke.py -q

      - name: Modular CLI registry-gate
        run: python -m pytest tests/test_modular_cli_selfhost_commands.py -q
