name: Selfhost Lexer Token Smoke

# Køyrer selfhost bootstrap gate når selfhost-lekseren eller tilhøyrande
# filer endrar seg. Brukar bin/nc — ingen Python eller C-kompilator trengs.

on:
  push:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  pull_request:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  token-smoke:
    name: Selfhost lexer parity-røyktest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installer Python-avhengigheiter
        run: python -m pip install --upgrade pip

      - name: Bygg bootstrap-binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Policy marker for bootstrap lane
        run: echo "ci --bootstrap-lane"

      - name: Selfhost bootstrap gate
        run: |
          chmod +x bin/nc
          ./bin/nc --legacy-python-fallback selfhost-bootstrap-gate

      - name: Røyk-test selfhost/main.no
        run: ./bin/nc run selfhost/main.no
