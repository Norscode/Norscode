name: Selfhost Lexer Token Smoke

on:
  push:
    paths:
      - 'selfhost/lexer/**'
      - 'tests/selfhost_lexer_token_smoke.no'
      - 'tests/test_selfhost_lexer_token_smoke.py'
      - 'norcode/**'
      - 'compiler/**'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  pull_request:
    paths:
      - 'selfhost/lexer/**'
      - 'tests/selfhost_lexer_token_smoke.no'
      - 'tests/test_selfhost_lexer_token_smoke.py'
      - 'norcode/**'
      - 'compiler/**'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  workflow_dispatch:

jobs:
  token-smoke:
    name: Token object runtime smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run token smoke CLI gate
        run: |
          norcode-modular selfhost-lexer-token-smoke --json

      - name: Run token smoke pytest gate
        run: |
          python -m pytest tests/test_selfhost_lexer_token_smoke.py -q
