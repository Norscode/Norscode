name: Selfhost Lexer Token Smoke

# Køyrer selfhost bootstrap gate når selfhost-lekseren eller tilhøyrande
# filer endrar seg. Brukar bin/nc — ingen Python eller C-kompilator trengs.

on:
  push:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  pull_request:
    paths:
      - 'selfhost/lexer/**'
      - 'selfhost/parser.no'
      - 'selfhost/compiler/**'
      - 'selfhost/bootstrap_gate.no'
      - '.github/workflows/selfhost-lexer-token-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: lexer-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  token-smoke:
    name: Selfhost lexer parity-røyktest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bygg norscode_native
        run: ./bin/nc run tools/build_norscode_native.no

      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed

      - name: Policy marker for bootstrap lane
        run: echo "ci --bootstrap-lane"

      - name: Selfhost bootstrap gate
        run: |
          chmod +x bin/nc
          ./bin/nc selfhost-bootstrap-gate

      - name: Røyk-test selfhost/nc_main.no
        run: |
          NORSCODE_VM_CAPABILITIES="env.read,disk.read,disk.write" \
          NORSCODE_VM_DISK_ROOT="$PWD,.,/tmp,/private/tmp" \
          ./bin/nc run selfhost/nc_main.no
