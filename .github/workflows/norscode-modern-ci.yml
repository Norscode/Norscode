name: Norscode Modern CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: |
          python -m pip install -e . --no-build-isolation

      - name: Verify CLI
        run: |
          norcode --help

      - name: Run core tests
        run: |
          norcode test --json

      - name: Run compiler checks
        run: |
          norcode check examples/advanced.no

      - name: Run lint
        run: |
          norcode lint examples/advanced.no || true

      - name: Run formatter validation
        run: |
          norcode format examples/advanced.no || true

      - name: Run selfhost parity
        run: |
          norcode selfhost-parity --suite m1

      - name: Run CI gate
        run: |
          norcode ci --check-names
