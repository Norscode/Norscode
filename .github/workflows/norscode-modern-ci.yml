name: Python-pakke CI

# Tester Norscode-pakken installert via pip.
# Dette er sekundær CI – for utviklere som jobber på Python-bootstrap-laget.
# Primær CI (native, Python-fri) er i ci.yml → jobben "native-macos".

on:
  push:
    branches:
      - main
    paths:
      - 'compiler/**'
      - 'norcode/**'
      - 'norsklang/**'
      - 'main.py'
      - 'pyproject.toml'
      - 'setup.py'
  pull_request:
    paths:
      - 'compiler/**'
      - 'norcode/**'
      - 'norsklang/**'
      - 'main.py'
      - 'pyproject.toml'
      - 'setup.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-package:
    name: Python-pakke (pip install)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installer pakke
        run: python -m pip install -e . --no-build-isolation

      - name: Verifiser CLI
        run: norcode --help

      - name: Kjør kjernetester
        run: norcode test --json

      - name: Selfhost bootstrap gate
        run: python3 main.py selfhost-bootstrap-gate
