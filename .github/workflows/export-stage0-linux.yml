# Engangsmigrering: lag bootstrap/stage0/norscode-linux-x86_64 frå bootstrap/c/
# Last ned artefakt og commit til repo, køyr deretter: bash tools/finish_6b4.sh
name: Export stage0 Linux seed

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

permissions:
  contents: read

jobs:
  export:
    name: Bygg og eksporter Linux stage0-seed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Installer clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Migrer bootstrap/c → stage0
        run: bash tools/migrate_bootstrap_c_to_stage0.sh

      - name: Verifiser seed
        run: |
          test -f bootstrap/stage0/norscode-linux-x86_64
          sha256sum bootstrap/stage0/norscode-linux-x86_64
          NORSCODE_CMD=run NORSCODE_FILE=tests/test_nc_main_smoke.no \
            bootstrap/stage0/norscode-linux-x86_64 >/dev/null

      - name: Last opp artefakt
        uses: actions/upload-artifact@v4
        with:
          name: norscode-linux-x86_64-stage0
          path: |
            bootstrap/stage0/norscode-linux-x86_64
          retention-days: 30
