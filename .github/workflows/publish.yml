name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─── macOS arm64 ─────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: Binary – macOS arm64
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: C/Python-gate
        run: ./bin/nc feature-check app.no

      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed

      - name: Bygg norscode_native
        run: ./bin/nc run tools/build_norscode_native.no

      - name: Verifiser hosting-runtime gate
        run: |
          set -euo pipefail
          NORSCODE_ROOT="$PWD" \
          NORSCODE_HOSTING_RUNTIME_BIN="$PWD/dist/norscode_native" \
          NORSCODE_ENABLE_EXEC_PROSESS=1 \
          NORSCODE_VM_CAPABILITIES="env.read,process.exec,disk.read,disk.write,net.dns,net.listen,net.connect,net.tls" \
          NORSCODE_VM_DISK_ROOT="$PWD,.,/tmp,/private/tmp" \
          ./bin/nc run tools/hosting_runtime_gate_v3610.no

      - name: Selfcheck og pakk
        run: |
          ./bin/nc selfcheck
          cp dist/norscode_native norscode-macos-arm64
          shasum -a 256 norscode-macos-arm64 > norscode-macos-arm64.sha256

      - name: Last opp artefakt
        uses: actions/upload-artifact@v6
        with:
          name: norscode-macos-arm64
          path: |
            norscode-macos-arm64
            norscode-macos-arm64.sha256

  # ─── Linux x86_64 ────────────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Binary – Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: C/Python-gate
        run: ./bin/nc feature-check app.no

      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed

      - name: Bygg norscode_native
        run: ./bin/nc run tools/build_norscode_native.no

      - name: Installer Zig for portable Argon2id
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zig

      - name: Verifiser portable Linux-releasekandidat
        run: |
          set -euo pipefail
          NORSCODE_ROOT="$PWD" \
          NORSCODE_ENABLE_EXEC_PROSESS=1 \
          NORSCODE_VM_CAPABILITIES="env.read,process.exec,disk.read,disk.write" \
          NORSCODE_VM_DISK_ROOT="$PWD,.,/tmp,/private/tmp" \
          ./bin/nc run tools/linux_zig_argon_release_gate_v3607.no

      - name: Selfcheck og pakk
        run: |
          cp build/v3600/linux/norscode_native_linux_x86_64_v3605_zigargon norscode-linux-x86_64
          chmod +x norscode-linux-x86_64
          sha256sum norscode-linux-x86_64 > norscode-linux-x86_64.sha256

      - name: Bygg stage-0 compiler ELF (Omgang 6b.4)
        run: ./bin/nc run tools/build_stage0_release_assets.no

      - name: Last opp artefakt
        uses: actions/upload-artifact@v6
        with:
          name: norscode-linux-x86_64
          path: |
            norscode-linux-x86_64
            norscode-linux-x86_64.sha256
            compiler_stage0-linux-x86_64.elf
            compiler_stage0-linux-x86_64.elf.sha256

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-macos-arm64, build-linux-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned alle artefakter
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: Publiser GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          body: |
            ## Installasjon

            **macOS (arm64):**
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/norscode-macos-arm64 -o norscode
            chmod +x norscode && sudo mv norscode /usr/local/bin/nc
            ```

            **Linux x86_64:**
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/norscode-linux-x86_64 -o norscode
            chmod +x norscode && sudo mv norscode /usr/local/bin/nc
            ```

            **Alle plattformer (automatisk):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install | sh
            ```
