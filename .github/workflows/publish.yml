name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─── macOS arm64 ─────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: Binary – macOS arm64
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfcheck og pakk
        run: |
          ./bin/nc selfcheck
          cp dist/norscode_native norscode-macos-arm64
          shasum -a 256 norscode-macos-arm64 > norscode-macos-arm64.sha256

      - name: Last opp artefakt
        uses: actions/upload-artifact@v4
        with:
          name: norscode-macos-arm64
          path: |
            norscode-macos-arm64
            norscode-macos-arm64.sha256

  # ─── Linux x86_64 ────────────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Binary – Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage-0 seed
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          bash tools/ensure_stage0_seed.sh

      - name: Bygg norscode_native
        run: bash tools/build_norscode_native.sh

      - name: Selfcheck og pakk
        run: |
          ./bin/nc selfcheck
          cp dist/norscode_native norscode-linux-x86_64
          chmod +x norscode-linux-x86_64
          sha256sum norscode-linux-x86_64 > norscode-linux-x86_64.sha256

      - name: Bygg stage-0 compiler ELF (Omgang 6b.4)
        run: bash tools/build_stage0_release_assets.sh

      - name: Last opp artefakt
        uses: actions/upload-artifact@v4
        with:
          name: norscode-linux-x86_64
          path: |
            norscode-linux-x86_64
            norscode-linux-x86_64.sha256
            compiler_stage0-linux-x86_64.elf
            compiler_stage0-linux-x86_64.elf.sha256

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-macos-arm64, build-linux-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned alle artefakter
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Publiser GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          body: |
            ## Installasjon

            **macOS (arm64):**
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/norscode-macos-arm64 -o norscode
            chmod +x norscode && sudo mv norscode /usr/local/bin/nc
            ```

            **Linux x86_64:**
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/norscode-linux-x86_64 -o norscode
            chmod +x norscode && sudo mv norscode /usr/local/bin/nc
            ```

            **Alle plattformer (automatisk):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install.sh | sh
            ```
