name: macOS App Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}
  MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

concurrency:
  group: macos-app-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-macos-app:
    name: Build macOS app artifacts
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: C/Python-gate
        run: bash tools/no_c_python_active_surface.sh

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Bygg native runtime
        run: bash tools/build_norscode_native.sh

      - name: Bygg macOS app
        run: bash tools/build-macos-app.sh --mode gui

      - name: Signer macOS app (ad-hoc fallback)
        if: env.MACOS_CODESIGN_IDENTITY == ''
        run: bash tools/sign-macos-app.sh --verify

      - name: Signer macOS app (Developer ID)
        if: env.MACOS_CODESIGN_IDENTITY != ''
        run: bash tools/sign-macos-app.sh --identity "$MACOS_CODESIGN_IDENTITY" --verify

      - name: Pakk macOS app artifacts
        run: bash tools/package-macos-app.sh --format all

      - name: Notariser PKG
        if: env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: bash tools/notarize-macos-app.sh release-artifacts/Norscode-macos-*.pkg

      - name: Last opp macOS app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: norscode-macos-app-artifacts
          path: |
            release-artifacts/Norscode-macos-*.zip
            release-artifacts/Norscode-macos-*.zip.sha256
            release-artifacts/Norscode-macos-*.pkg
            release-artifacts/Norscode-macos-*.pkg.sha256
            release-artifacts/Norscode-macos-*.dmg
            release-artifacts/Norscode-macos-*.dmg.sha256
          if-no-files-found: warn
          retention-days: 7

  github-release:
    name: GitHub Release (macOS app)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-macos-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned macOS app artifacts
        uses: actions/download-artifact@v4
        with:
          name: norscode-macos-app-artifacts
          path: release-assets/

      - name: Publiser macOS app artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          append_body: true
          body: |

            ## macOS app

            Denne releasen inneheld no primære macOS app-artefakt:

            - `Norscode-macos-<versjon>.zip`
            - `Norscode-macos-<versjon>.pkg`
            - `Norscode-macos-<versjon>.dmg` berre når DMG-bygging lukkast i workflowen

            Lokal installasjon og byggesteg er dokumentert i `docs/MAC_APP_RELEASE.md` og `docs/MAC_APP_SIGNING.md`.
