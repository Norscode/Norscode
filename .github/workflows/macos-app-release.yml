name: macOS App Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}
  MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

concurrency:
  group: macos-app-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-macos-app:
    name: Build macOS app artifacts
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Materialiser stage-0 seed
        run: ./bin/nc fetch-stage0-seed

      - name: C/Python-gate
        run: ./bin/nc feature-check app.no

      - name: Verifiser stage-0 seed
        run: ./bin/nc verify-seed

      - name: Bygg native runtime
        run: ./bin/nc run tools/build_norscode_native.no

      - name: Verifiser hosting-runtime gate
        run: |
          set -euo pipefail
          NORSCODE_ROOT="$PWD" \
          NORSCODE_HOSTING_RUNTIME_BIN="$PWD/dist/norscode_native" \
          NORSCODE_ENABLE_EXEC_PROSESS=1 \
          NORSCODE_VM_CAPABILITIES="env.read,process.exec,disk.read,disk.write,net.dns,net.listen,net.connect,net.tls" \
          NORSCODE_VM_DISK_ROOT="$PWD,.,/tmp,/private/tmp" \
          ./bin/nc run tools/hosting_runtime_gate_v3610.no

      - name: Bygg macOS app
        run: NORSCODE_MACOS_APP_MODE=gui ./bin/nc run tools/build-macos-app.no

      - name: Signer macOS app (ad-hoc fallback)
        if: env.MACOS_CODESIGN_IDENTITY == ''
        run: NORSCODE_MACOS_SIGN_VERIFY=1 ./bin/nc run tools/sign-macos-app.no

      - name: Signer macOS app (Developer ID)
        if: env.MACOS_CODESIGN_IDENTITY != ''
        run: NORSCODE_MACOS_SIGN_IDENTITY="$MACOS_CODESIGN_IDENTITY" NORSCODE_MACOS_SIGN_VERIFY=1 ./bin/nc run tools/sign-macos-app.no

      - name: Pakk macOS app artifacts
        run: NORSCODE_MACOS_PACKAGE_FORMAT=all ./bin/nc run tools/package-macos-app.no

      - name: Notariser PKG
        if: env.MACOS_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: |
          for artifact in release-artifacts/Norscode-macos-*.pkg; do
            NORSCODE_MACOS_NOTARIZE_ARTIFACT="$artifact" ./bin/nc run tools/notarize-macos-app.no
          done

      - name: Last opp macOS app artifacts
        uses: actions/upload-artifact@v6
        with:
          name: norscode-macos-app-artifacts
          path: |
            release-artifacts/Norscode-macos-*.zip
            release-artifacts/Norscode-macos-*.zip.sha256
            release-artifacts/Norscode-macos-*.pkg
            release-artifacts/Norscode-macos-*.pkg.sha256
            release-artifacts/Norscode-macos-*.dmg
            release-artifacts/Norscode-macos-*.dmg.sha256
          if-no-files-found: warn
          retention-days: 7

  github-release:
    name: GitHub Release (macOS app)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-macos-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned macOS app artifacts
        uses: actions/download-artifact@v7
        with:
          name: norscode-macos-app-artifacts
          path: release-assets/

      - name: Publiser macOS app artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          append_body: true
          body: |

            ## macOS app

            Denne releasen inneheld no primære macOS app-artefakt:

            - `Norscode-macos-<versjon>.zip`
            - `Norscode-macos-<versjon>.pkg`
            - `Norscode-macos-<versjon>.dmg` berre når DMG-bygging lukkast i workflowen

            Lokal installasjon og byggesteg er dokumentert i `docs/MAC_APP_RELEASE.md` og `docs/MAC_APP_SIGNING.md`.
