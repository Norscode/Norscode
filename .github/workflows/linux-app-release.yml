name: Linux App Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: linux-app-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux-app:
    name: Build Linux app artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: C/Python-gate
        run: bash tools/no_c_python_active_surface.sh

      - name: Stage-0 seed
        run: bash tools/ensure_stage0_seed.sh

      - name: Bygg native runtime
        run: bash tools/build_norscode_native.sh

      - name: Bygg Linux app artifacts
        run: bash tools/package-linux-app.sh --format all

      - name: Last opp Linux app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: norscode-linux-app-artifacts
          path: |
            release-artifacts/Norscode-linux-*-AppDir.tar.gz
            release-artifacts/Norscode-linux-*-AppDir.tar.gz.sha256
            release-artifacts/Norscode-linux-*.AppImage
            release-artifacts/Norscode-linux-*.AppImage.sha256
          if-no-files-found: warn
          retention-days: 7

  github-release:
    name: GitHub Release (Linux app)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-linux-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Last ned Linux app artifacts
        uses: actions/download-artifact@v4
        with:
          name: norscode-linux-app-artifacts
          path: release-assets/

      - name: Publiser Linux app artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          append_body: true
          body: |

            ## Linux app

            Denne releasen inneheld no Linux app-artefakt:

            - `Norscode-linux-<versjon>-AppDir.tar.gz`
            - `Norscode-linux-<versjon>.AppImage` naar AppImage-bygging lukkast

            Installasjon og oppgradering er dokumentert i `docs/LINUX_APP_RELEASE.md` og `docs/LINUX_APP_INSTALL.md`.
