<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Norscode .no file icon</title>
  <desc id="desc">Primary Norscode source file icon for .no files.</desc>
  <defs>
    <linearGradient id="page" x1="108" y1="40" x2="410" y2="474" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101d"/>
      <stop offset="1" stop-color="#02050d"/>
    </linearGradient>
    <linearGradient id="edge" x1="120" y1="50" x2="410" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5af5ff"/>
      <stop offset="0.42" stop-color="#1c95ff"/>
      <stop offset="0.76" stop-color="#8160ff"/>
      <stop offset="1" stop-color="#f4efff"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="48%" r="58%">
      <stop stop-color="#53ecff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#7b61ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#02050d"/>
  <circle cx="256" cy="252" r="204" fill="url(#aura)"/>
  <g filter="url(#glow)">
    <path d="M118 52h194l82 82v326H118z" fill="url(#page)" stroke="url(#edge)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M312 56v82h80" fill="#101b2d" stroke="url(#edge)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M170 292V158h38l72 86v-86h42v134h-42l-72-86v86z" fill="url(#edge)"/>
    <path d="M174 360h164" stroke="#5af5ff" stroke-width="12" stroke-linecap="round"/>
    <path d="M196 402h120" stroke="#8160ff" stroke-width="12" stroke-linecap="round"/>
  </g>
  <text x="256" y="448" text-anchor="middle" fill="#e9e7ff" font-size="48" font-weight="800" letter-spacing="5" font-family="Orbitron, Rajdhani, Avenir Next, sans-serif">.NO</text>
</svg>
