<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Norscode .no file icon</title>
  <desc id="desc">Primary Norscode source file icon for .no files without an outer white frame.</desc>
  <defs>
    <linearGradient id="page" x1="112" y1="48" x2="402" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111f33"/>
      <stop offset="0.58" stop-color="#07101d"/>
      <stop offset="1" stop-color="#030711"/>
    </linearGradient>
    <linearGradient id="edge" x1="116" y1="56" x2="402" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5af5ff"/>
      <stop offset="0.42" stop-color="#1c95ff"/>
      <stop offset="1" stop-color="#8160ff"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="46%" r="56%">
      <stop stop-color="#53ecff" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#7b61ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-24%" y="-22%" width="148%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000713" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-36%" y="-34%" width="172%" height="172%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#02050d"/>
  <circle cx="256" cy="254" r="204" fill="url(#aura)"/>
  <g filter="url(#shadow)">
    <path d="M112 48h198l90 90v322H112z" fill="url(#page)" stroke="url(#edge)" stroke-width="12" stroke-linejoin="round"/>
    <path d="M310 54v86h86" fill="#122035" stroke="url(#edge)" stroke-width="12" stroke-linejoin="round"/>
  </g>
  <g filter="url(#glow)">
    <path d="M162 328V160h48l92 106V160h48v168h-48l-92-106v106z" fill="url(#edge)"/>
    <path d="M164 382h184" stroke="#5af5ff" stroke-width="14" stroke-linecap="round"/>
    <path d="M196 424h120" stroke="#8160ff" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
