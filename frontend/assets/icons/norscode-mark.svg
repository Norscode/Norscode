<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Norscode app mark</title>
  <desc id="desc">Standalone Norscode icon derived from the homepage logo.</desc>

  <defs>
    <linearGradient id="iconGrad" x1="140" y1="90" x2="460" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5af5ff"/>
      <stop offset="0.38" stop-color="#1c95ff"/>
      <stop offset="0.72" stop-color="#8160ff"/>
      <stop offset="1" stop-color="#f4efff"/>
    </linearGradient>
    <linearGradient id="frameGlass" x1="180" y1="130" x2="420" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.24" stop-color="#b6f7ff" stop-opacity="0.28"/>
      <stop offset="0.7" stop-color="#6da6ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="faceGlass" x1="246" y1="182" x2="418" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="0.28" stop-color="#d2fbff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#53ecff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#7b61ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#02050d" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="none"/>
  <circle cx="300" cy="300" r="200" fill="url(#aura)"/>

  <g filter="url(#shadow)">
    <rect x="175" y="125" width="250" height="250" rx="72" fill="#09111b" fill-opacity="0.48"/>
  </g>

  <g filter="url(#glow)">
    <rect x="175" y="125" width="250" height="250" rx="72" fill="url(#frameGlass)" fill-opacity="0.22"/>
    <rect x="175" y="125" width="250" height="250" rx="72" stroke="url(#iconGrad)" stroke-width="14"/>
    <path d="M244 307V195C244 186 251 179 260 179H286C295 179 302 186 302 195V257L364 179H402C411 179 418 186 418 195V307C418 316 411 323 402 323H376C367 323 360 316 360 307V245L298 323H260C251 323 244 316 244 307Z" fill="url(#iconGrad)"/>
    <path d="M244 307V195C244 186 251 179 260 179H286C295 179 302 186 302 195V257L364 179H402C411 179 418 186 418 195V307C418 316 411 323 402 323H376C367 323 360 316 360 307V245L298 323H260C251 323 244 316 244 307Z" fill="url(#faceGlass)"/>
    <path d="M259 184H286C295 184 302 190 302 199V248L364 179H402C407 179 412 181 415 185" stroke="#ffffff" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
    <path d="M245 307V195C245 186 251 180 260 180" stroke="#ffffff" stroke-opacity="0.26" stroke-width="6" stroke-linecap="round"/>
    <path d="M205 222H145" stroke="#5af5ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M205 265H138" stroke="#1c95ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M205 308H150" stroke="#8160ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M395 222H455" stroke="#5af5ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M395 265H462" stroke="#1c95ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M395 308H450" stroke="#8160ff" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
