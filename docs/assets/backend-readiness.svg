<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Backend readiness</title>
  <desc id="desc">A compact illustration showing the progression from core web features to productized backend readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#edf4f8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163042"/>
      <stop offset="100%" stop-color="#4f7f97"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#203344" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; }
      .subtitle { font: 400 20px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #51616f; }
      .step { font: 700 18px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #153042; }
      .text { font: 400 14px/1.45 "Inter", "Segoe UI", Arial, sans-serif; fill: #5b6b78; }
      .small { font: 600 13px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #738495; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1052" cy="102" r="86" fill="#dbe7f1" opacity="0.63"/>
  <circle cx="166" cy="418" r="108" fill="#e3edf6" opacity="0.65"/>

  <g filter="url(#shadow)">
    <rect x="62" y="52" width="1076" height="416" rx="28" fill="url(#panel)"/>
  </g>

  <rect x="92" y="86" width="170" height="16" rx="8" fill="url(#accent)"/>
  <circle cx="1048" cy="132" r="38" fill="#4f7f97" opacity="0.96"/>
  <text x="1048" y="144" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">B</text>
  <text x="92" y="150" class="title">Backend readiness</text>
  <text x="92" y="188" class="subtitle">Frå språkfunksjonar til ei driftbar backend-flate med klare mønster og dokumentasjon.</text>

  <g transform="translate(92 244)">
    <rect x="0" y="0" width="1016" height="146" rx="24" fill="#f9fbfd" stroke="#dde6ee"/>
    <text x="26" y="26" class="small">Modningslinje</text>
    <rect x="30" y="54" width="956" height="14" rx="7" fill="#d7e3ec"/>

    <circle cx="156" cy="61" r="22" fill="#163042"/>
    <circle cx="156" cy="61" r="10" fill="#ffffff"/>
    <text x="106" y="108" class="step">Kjerne</text>
    <text x="82" y="132" class="text">HTTP, JSON og validering</text>

    <circle cx="404" cy="61" r="22" fill="#2f6f8f"/>
    <circle cx="404" cy="61" r="10" fill="#ffffff"/>
    <text x="352" y="108" class="step">Produktmønstre</text>
    <text x="336" y="132" class="text">Auth, middleware og persistens</text>

    <circle cx="658" cy="61" r="22" fill="#4f7f97"/>
    <circle cx="658" cy="61" r="10" fill="#ffffff"/>
    <text x="618" y="108" class="step">Drift</text>
    <text x="578" y="132" class="text">Observability og releaseflyt</text>

    <circle cx="886" cy="61" r="22" fill="#b97a3b"/>
    <circle cx="886" cy="61" r="10" fill="#ffffff"/>
    <text x="836" y="108" class="step">Modenhet</text>
    <text x="798" y="132" class="text">Dokumentasjon og stabilitet</text>
  </g>

  <g transform="translate(92 426)">
    <text x="0" y="0" class="text">Målet er at backend ikkje berre skal kunne byggjast, men òg forståast, driftast og vidareutviklast utan friksjon.</text>
  </g>
</svg>
