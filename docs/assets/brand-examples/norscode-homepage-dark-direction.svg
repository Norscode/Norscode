<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 500" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Norscode dark homepage direction</title>
  <desc id="desc">A dark horizontal Norscode logo direction with neon gradients, a selfhost-inspired N mark, and a clean wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#02050d"/>
      <stop offset="0.52" stop-color="#07101d"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="154" y1="112" x2="458" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5af5ff"/>
      <stop offset="0.34" stop-color="#1c95ff"/>
      <stop offset="0.68" stop-color="#8160ff"/>
      <stop offset="1" stop-color="#f4efff"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="560" y1="250" x2="1510" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5af5ff"/>
      <stop offset="0.28" stop-color="#1da0ff"/>
      <stop offset="0.58" stop-color="#7b61ff"/>
      <stop offset="0.86" stop-color="#ddd7ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="55%">
      <stop stop-color="#53ecff" stop-opacity="0.22"/>
      <stop offset="0.54" stop-color="#7b61ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1800" height="500" fill="url(#bg)"/>
  <circle cx="302" cy="250" r="184" fill="url(#aura)"/>
  <path d="M114 410C285 336 370 184 520 92" stroke="#1c95ff" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M96 92C260 150 402 322 532 410" stroke="#8160ff" stroke-opacity="0.13" stroke-width="2"/>

  <g filter="url(#glow)">
    <rect x="174" y="124" width="252" height="252" rx="74" stroke="url(#markGrad)" stroke-width="14"/>
    <path d="M242 307V194C242 184 250 176 260 176H286C294 176 301 179 306 186L360 257V194C360 184 368 176 378 176H403C413 176 421 184 421 194V307C421 317 413 325 403 325H378C370 325 363 321 358 315L304 244V307C304 317 296 325 286 325H260C250 325 242 317 242 307Z" fill="url(#markGrad)"/>
    <path d="M203 220H142" stroke="#5af5ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M203 265H134" stroke="#1c95ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M203 310H148" stroke="#8160ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M397 220H458" stroke="#5af5ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M397 265H466" stroke="#1c95ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M397 310H452" stroke="#8160ff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g filter="url(#softGlow)">
    <text x="558" y="286"
          fill="url(#wordGrad)"
          font-size="110"
          font-weight="800"
          letter-spacing="11"
          font-family="Orbitron, Rajdhani, Eurostile, Avenir Next, sans-serif">NORSCODE</text>
  </g>
  <text x="565" y="350"
        fill="#a9b9ff"
        opacity="0.9"
        font-size="24"
        letter-spacing="8"
        font-family="Orbitron, Rajdhani, Avenir Next, sans-serif">SELFHOST • NATIVE • SERVER • NORSDB • TOOLCHAIN</text>
</svg>
