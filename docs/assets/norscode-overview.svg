<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Norscode overview</title>
  <desc id="desc">A clean overview of the Norscode documentation and selfhost flow from entry point to runtime and release.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163042"/>
      <stop offset="100%" stop-color="#4f7f97"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1f3344" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 48px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; }
      .subtitle { font: 400 20px/1.45 "Inter", "Segoe UI", Arial, sans-serif; fill: #4a5b6b; }
      .section { font: 700 20px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; letter-spacing: 0.2px; }
      .label { font: 600 17px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #163042; }
      .text { font: 400 15px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #4a5b6b; }
      .small { font: 500 13px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #6a7b8a; letter-spacing: 0.4px; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="110" fill="#dbe7f1" opacity="0.55"/>
  <circle cx="170" cy="590" r="140" fill="#e3edf6" opacity="0.6"/>

  <g filter="url(#shadow)">
    <rect x="66" y="62" width="1068" height="596" rx="30" fill="url(#panel)"/>
  </g>

  <rect x="96" y="94" width="180" height="18" rx="9" fill="url(#accent)"/>
  <circle cx="1048" cy="132" r="38" fill="#163042" opacity="0.96"/>
  <text x="1048" y="144" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">N</text>
  <text x="96" y="164" class="title">Norscode</text>
  <text x="96" y="206" class="subtitle">Eit norsk programmeringsspråk med native-first flyt, selfhost-bane og tydeleg dokumentasjon.</text>

  <g transform="translate(96 280)">
    <text x="0" y="-18" class="section">Dokumentasjon</text>
    <rect x="0" y="0" width="270" height="162" rx="22" fill="#ffffff" stroke="#d8e1ea"/>
    <rect x="18" y="20" width="66" height="66" rx="16" fill="#e7f0f8"/>
    <text x="21" y="60" class="label">README</text>
    <text x="102" y="42" class="text">Startpunktet for nye brukere.</text>
    <text x="102" y="68" class="text">Kort fortalt, eksempel og rask start.</text>

    <rect x="18" y="98" width="66" height="44" rx="14" fill="#f0f4f8"/>
    <text x="27" y="125" class="small">Docs</text>
    <text x="102" y="114" class="text">INDEX, START_HER, COOKBOOK og</text>
    <text x="102" y="138" class="text">andre toppdokumenter.</text>
  </g>

  <g transform="translate(405 280)">
    <text x="0" y="-18" class="section">Selfhost</text>
    <rect x="0" y="0" width="350" height="162" rx="22" fill="#ffffff" stroke="#d8e1ea"/>
    <rect x="18" y="20" width="92" height="44" rx="14" fill="#eaf5ef"/>
    <text x="34" y="48" class="label">Parser</text>
    <rect x="126" y="20" width="92" height="44" rx="14" fill="#eaf5ef"/>
    <text x="138" y="48" class="label">Semantikk</text>
    <rect x="234" y="20" width="98" height="44" rx="14" fill="#eaf5ef"/>
    <text x="250" y="48" class="label">IR / VM</text>
    <path d="M53 72 L53 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <path d="M171 72 L171 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <path d="M283 72 L283 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <text x="18" y="138" class="text">Målet er éin stabil kontrakt frå kjelde til køyrbar flyt.</text>
  </g>

  <g transform="translate(786 280)">
    <text x="0" y="-18" class="section">Drift</text>
    <rect x="0" y="0" width="322" height="162" rx="22" fill="#ffffff" stroke="#d8e1ea"/>
    <rect x="18" y="20" width="86" height="44" rx="14" fill="#f9efe7"/>
    <text x="33" y="48" class="label">Release</text>
    <rect x="117" y="20" width="86" height="44" rx="14" fill="#f9efe7"/>
    <text x="127" y="48" class="label">Install</text>
    <rect x="216" y="20" width="88" height="44" rx="14" fill="#f9efe7"/>
    <text x="228" y="48" class="label">Verify</text>
    <path d="M61 72 L61 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <path d="M160 72 L160 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <path d="M260 72 L260 112" stroke="#8ea4b3" stroke-width="3" stroke-linecap="round"/>
    <text x="18" y="138" class="text">Normal veg skal vere tydeleg, repeterbar og lett å vedlikehalde.</text>
  </g>

  <g transform="translate(96 498)">
    <rect x="0" y="0" width="1010" height="112" rx="24" fill="#f7fafc" stroke="#dde7ef"/>
    <text x="24" y="38" class="section">Leserekkefølge</text>
    <text x="24" y="72" class="text">README → START_HER → docs/INDEX → selfhost-plan → selfhost-status → release og drift</text>
    <text x="24" y="94" class="text">Illustrasjonen over er meint som eit enkelt kart, ikkje som ein full arkitekturspesifikasjon.</text>
  </g>
</svg>
