<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Selfhost status</title>
  <desc id="desc">A compact status illustration showing the path from native-first normal flow to selfhost, CI, and release.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#edf4f8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9e6f2"/>
      <stop offset="55%" stop-color="#d7e7f2"/>
      <stop offset="100%" stop-color="#c4d7e7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163042"/>
      <stop offset="100%" stop-color="#4f7f97"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#203344" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; }
      .subtitle { font: 400 20px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #51616f; }
      .label { font: 600 16px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #173042; }
      .text { font: 400 14px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #576a79; }
      .small { font: 600 13px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #738495; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1060" cy="96" r="84" fill="#dbe7f1" opacity="0.65"/>
  <circle cx="162" cy="420" r="110" fill="#e3edf6" opacity="0.62"/>

  <g filter="url(#shadow)">
    <rect x="62" y="52" width="1076" height="416" rx="28" fill="url(#card)"/>
  </g>

  <rect x="92" y="86" width="170" height="16" rx="8" fill="url(#accent)"/>
  <circle cx="1048" cy="132" r="38" fill="#4f7f97" opacity="0.96"/>
  <text x="1048" y="144" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">S</text>
  <text x="92" y="150" class="title">Selfhost status</text>
  <text x="92" y="188" class="subtitle">En kort visuell oversikt over normalvei, selfhost-kjerne, CI og release.</text>

  <g transform="translate(92 246)">
    <rect x="0" y="0" width="1016" height="146" rx="24" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="26" y="32" width="964" height="14" rx="7" fill="url(#track)"/>

    <circle cx="126" cy="39" r="22" fill="#163042"/>
    <circle cx="126" cy="39" r="10" fill="#ffffff"/>
    <text x="96" y="92" class="label">Normalvei</text>
    <text x="72" y="116" class="text">Native-first</text>

    <circle cx="366" cy="39" r="22" fill="#2f6f8f"/>
    <circle cx="366" cy="39" r="10" fill="#ffffff"/>
    <text x="333" y="92" class="label">Selfhost</text>
    <text x="309" y="116" class="text">Kjernekontrakt</text>

    <circle cx="608" cy="39" r="22" fill="#4f7f97"/>
    <circle cx="608" cy="39" r="10" fill="#ffffff"/>
    <text x="575" y="92" class="label">CI</text>
    <text x="548" y="116" class="text">Parity og gates</text>

    <circle cx="852" cy="39" r="22" fill="#b97a3b"/>
    <circle cx="852" cy="39" r="10" fill="#ffffff"/>
    <text x="815" y="92" class="label">Release</text>
    <text x="782" y="116" class="text">Installasjon og drift</text>

    <text x="26" y="26" class="small">Statuslinje</text>
  </g>

  <g transform="translate(92 410)">
    <text x="0" y="0" class="text">Målet er at selvhost skal bli den naturlige veien, mens legacy bare er tydelig historikk og eksplisitt unntak.</text>
  </g>
</svg>
