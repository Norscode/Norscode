<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Selfhost plan</title>
  <desc id="desc">A compact illustration of the selfhost plan in five stages from status lock to maintenance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163042"/>
      <stop offset="100%" stop-color="#4f7f97"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#203344" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; }
      .subtitle { font: 400 20px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #51616f; }
      .step { font: 700 18px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #153042; }
      .text { font: 400 14px/1.45 "Inter", "Segoe UI", Arial, sans-serif; fill: #5b6b78; }
      .small { font: 600 13px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #738495; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="98" r="86" fill="#dbe7f1" opacity="0.62"/>
  <circle cx="176" cy="420" r="102" fill="#e3eee9" opacity="0.68"/>

  <g filter="url(#shadow)">
    <rect x="62" y="52" width="1076" height="416" rx="28" fill="url(#panel)"/>
  </g>

  <rect x="92" y="86" width="170" height="16" rx="8" fill="url(#accent)"/>
  <circle cx="1048" cy="132" r="38" fill="#4f7f97" opacity="0.96"/>
  <text x="1048" y="144" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">P</text>
  <text x="92" y="150" class="title">Selfhost plan</text>
  <text x="92" y="188" class="subtitle">Fem små omganger som flytter prosjektet fra statusrydding til vedlikehold.</text>

  <g transform="translate(88 238)">
    <text x="0" y="-18" class="small">Omgangene</text>
    <rect x="0" y="0" width="206" height="156" rx="22" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="16" y="18" width="54" height="54" rx="16" fill="#163042"/>
    <text x="34" y="51" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">0</text>
    <text x="84" y="40" class="step">Lås status</text>
    <text x="84" y="66" class="text">Normalvei, legacy og docs</text>
    <text x="84" y="88" class="text">må si det samme.</text>
  </g>

  <g transform="translate(308 238)">
    <rect x="0" y="0" width="206" height="156" rx="22" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="16" y="18" width="54" height="54" rx="16" fill="#2f6f8f"/>
    <text x="34" y="51" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1</text>
    <text x="84" y="40" class="step">Selfhost-kjerne</text>
    <text x="84" y="66" class="text">Parser, semantikk, IR</text>
    <text x="84" y="88" class="text">og VM på samme kontrakt.</text>
  </g>

  <g transform="translate(528 238)">
    <rect x="0" y="0" width="206" height="156" rx="22" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="16" y="18" width="54" height="54" rx="16" fill="#4f7f97"/>
    <text x="34" y="51" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2</text>
    <text x="84" y="40" class="step">Fjern bootstrap</text>
    <text x="84" y="66" class="text">Normalvei skal være native</text>
    <text x="84" y="88" class="text">og lett å lese.</text>
  </g>

  <g transform="translate(748 238)">
    <rect x="0" y="0" width="206" height="156" rx="22" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="16" y="18" width="54" height="54" rx="16" fill="#b97a3b"/>
    <text x="34" y="51" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">3</text>
    <text x="84" y="40" class="step">Fjern C-spor</text>
    <text x="84" y="66" class="text">Release og installasjon</text>
    <text x="84" y="88" class="text">skal ikke kreve gammel kjede.</text>
  </g>

  <g transform="translate(968 238)">
    <rect x="0" y="0" width="138" height="156" rx="22" fill="#f9fbfd" stroke="#dde6ee"/>
    <rect x="16" y="18" width="54" height="54" rx="16" fill="#5e7f63"/>
    <text x="34" y="51" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">5</text>
    <text x="20" y="104" class="step">Drift</text>
    <text x="20" y="128" class="text">og vedlikehold</text>
  </g>

  <g transform="translate(92 430)">
    <text x="0" y="0" class="text">Illustrasjonen viser at planen er sekvensiell: først sannhet og kontrakt, så forenkling, så drift.</text>
  </g>
</svg>
