<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Maintenance policy</title>
  <desc id="desc">A compact illustration showing release cadence, support window, deprecation, and verification as a policy flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#eef4f0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163042"/>
      <stop offset="100%" stop-color="#4f7f97"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#203344" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #102030; }
      .subtitle { font: 400 20px/1.5 "Inter", "Segoe UI", Arial, sans-serif; fill: #51616f; }
      .step { font: 700 18px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #153042; }
      .text { font: 400 14px/1.45 "Inter", "Segoe UI", Arial, sans-serif; fill: #5b6b78; }
      .small { font: 600 13px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #738495; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="98" r="84" fill="#dbe7f1" opacity="0.6"/>
  <circle cx="168" cy="420" r="108" fill="#e4efe8" opacity="0.66"/>

  <g filter="url(#shadow)">
    <rect x="62" y="52" width="1076" height="416" rx="28" fill="url(#panel)"/>
  </g>

  <rect x="92" y="86" width="170" height="16" rx="8" fill="url(#accent)"/>
  <circle cx="1048" cy="132" r="38" fill="#b97a3b" opacity="0.96"/>
  <text x="1048" y="144" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">M</text>
  <text x="92" y="150" class="title">Maintenance policy</text>
  <text x="92" y="188" class="subtitle">En stabil rytme for release, støttevinduer, migrering og verifikasjon.</text>

  <g transform="translate(92 246)">
    <rect x="0" y="0" width="1016" height="146" rx="24" fill="#f9fbfd" stroke="#dde6ee"/>
    <text x="26" y="26" class="small">Policyflow</text>

    <rect x="28" y="54" width="960" height="14" rx="7" fill="#d7e3ec"/>
    <rect x="28" y="54" width="220" height="14" rx="7" fill="#163042"/>
    <rect x="248" y="54" width="220" height="14" rx="7" fill="#2f6f8f"/>
    <rect x="468" y="54" width="220" height="14" rx="7" fill="#4f7f97"/>
    <rect x="688" y="54" width="300" height="14" rx="7" fill="#b97a3b"/>

    <text x="40" y="104" class="step">Release-kadens</text>
    <text x="40" y="128" class="text">Patch, minor, major</text>

    <text x="258" y="104" class="step">Støttevinduer</text>
    <text x="258" y="128" class="text">Current og kort tilbakeport</text>

    <text x="480" y="104" class="step">Deprecation</text>
    <text x="480" y="128" class="text">Varsle, dokumentere, fjerne</text>

    <text x="706" y="104" class="step">Verifikasjon</text>
    <text x="706" y="128" class="text">Policy og drift må matche</text>
  </g>

  <g transform="translate(92 426)">
    <text x="0" y="0" class="text">Policyen skal gjere endringar rolege og føreseielege, ikkje berre formelt dokumenterte.</text>
  </g>
</svg>
