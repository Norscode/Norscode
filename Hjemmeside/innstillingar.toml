[global]
PROFILE = "development"
DATABASE_URL = "app.db"
SECURE_HEADERS = "sann"
REQUIRE_ALLOWED_HOSTS = "sann"
DEBUG = sann
SERVER_HOST = "0.0.0.0"
SERVER_PORT = 4173
ALLOWED_HOSTS = "localhost,127.0.0.1"
SECURITY_MIDDLEWARE = "sann"
REQUEST_LOG = "usann"
REQUEST_LOG_INCLUDE_BODY = "usann"
RATE_LIMIT_ENABLED = "usann"
RATE_LIMIT_MAX = "120"
RATE_LIMIT_KEY = "ip"
BRUTEFORCE_LOGIN_ENABLED = "sann"
BRUTEFORCE_LOGIN_MAX = "3"
BRUTEFORCE_LOGIN_WINDOW_SEK = "120"
BRUTEFORCE_LOGIN_KEY = "ip"
SESSION_TIMEOUT = 86400
LOG_LEVEL = "INFO"
CACHE_BACKEND = "minne"
CACHE_DIR = "cache/"
LOCALE_DIR = "locale/"
DEFAULT_LANGUAGE = "nn"
EMAIL_BACKEND = "konsoll"
EMAIL_HOST = "localhost"
EMAIL_PORT = 587
EMAIL_USER = ""
EMAIL_PASS = ""
EMAIL_FROM = "noreply@localhost"

[development]
DEBUG = sann
SESSION_TIMEOUT = 86400

[testing]
DEBUG = usann
SESSION_TIMEOUT = 900
DATABASE_URL = ":memory:"

[production]
DEBUG = usann
SESSION_TIMEOUT = 3600
